name: Deploy Staging

on:
  push:
    branches:
      - dev
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and Push Backend Image
        run: |
          docker build -t asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/orean-images/orean-backend:${{ github.sha }} ./backend
          docker push asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/orean-images/orean-backend:${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wake up Staging Database
        run: |
          python -c '
          import socket, time, sys
          host = "ep-still-hall-aoaf4cco-pooler.c-2.ap-southeast-1.aws.neon.tech"
          port = 5432
          print("Checking database connection...")
          for i in range(15):
              try:
                  s = socket.create_connection((host, port), timeout=3)
                  print("Database is awake and reachable!")
                  s.close()
                  sys.exit(0)
              except Exception as e:
                  print(f"Database connection attempt {i+1} failed: {e}. Retrying in 3 seconds...")
                  time.sleep(3)
          print("Could not connect to database host after 15 attempts.")
          sys.exit(1)
          '

      - name: Run Prisma Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
        run: |
          cd backend
          npm install
          npx prisma migrate deploy

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy orean-backend-staging \
            --image=asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/orean-images/orean-backend:${{ github.sha }} \
            --region=asia-southeast1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }},REDIS_URL=${{ secrets.REDIS_URL_STAGING }}"

      - name: Get Backend URL
        run: |
          BACKEND_URL=$(gcloud run services describe orean-backend-staging --platform=managed --region=asia-southeast1 --format="value(status.url)")
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      - name: Build and Push Frontend Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=$BACKEND_URL \
            -t asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/orean-images/orean-frontend:${{ github.sha }} ./orean-web
          docker push asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/orean-images/orean-frontend:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy orean-frontend-staging \
            --image=asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/orean-images/orean-frontend:${{ github.sha }} \
            --region=asia-southeast1 \
            --platform=managed \
            --allow-unauthenticated

