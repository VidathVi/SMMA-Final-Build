# Fluent Bit configuration values for fluent/fluent-bit Helm chart (Section 9.2)

# DaemonSet settings (run one pod per node)
daemonKeys: {}

config:
  service: |
    [SERVICE]
        Daemon          off
        Flush           1
        Log_Level       info
        Parsers_File    parsers.conf
        Parsers_File    custom_parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    # Enrich logs with Kubernetes metadata (namespace, pod name, labels, annotations)
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

  outputs: |
    # Option 1: Send logs directly to Google Cloud Logging (Stackdriver) - Free and native inside GKE
    [OUTPUT]
        Name            stackdriver
        Match           *
        # GKE automatically handles authentication via Workload Identity or Instance Metadata
        Severity_Key    level

    # Option 2: Send logs to Grafana Loki (Alternative - commented out)
    # [OUTPUT]
    #     Name            loki
    #     Match           *
    #     Host            loki.monitoring.svc
    #     Port            3100
    #     Tenant_ID       orean
    #     Labels          job=fluentbit, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name']

  customParsers: |
    # JSON parser for Docker/CRI container log lines
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    # Parsers for structured logs from the application backend (e.g. Winston/Pino JSON formatted logs)
    [PARSER]
        Name        app-json-parser
        Format      json
        Time_Key    time
        Time_Format %d/%b/%Y:%H:%M:%S %z
