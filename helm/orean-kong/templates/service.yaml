apiVersion: v1
kind: Service
metadata:
  name: {{ include "orean-kong.fullname" . }}
  labels:
    {{- include "orean-kong.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.proxyPort }}
      targetPort: {{ .Values.service.proxyPort }}
      protocol: TCP
      name: proxy
    - port: {{ .Values.service.adminPort }}
      targetPort: {{ .Values.service.adminPort }}
      protocol: TCP
      name: admin
  selector:
    {{- include "orean-kong.selectorLabels" . | nindent 4 }}
