apiVersion: v1
kind: Secret
metadata:
  name: orean-secrets
  namespace: orean
  labels:
    {{- include "orean-secrets.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | toString | b64enc | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | toString | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | toString | b64enc | quote }}
  MODAL_API_KEY: {{ .Values.secrets.modalApiKey | toString | b64enc | quote }}
  GEO_ENGINE_URL: {{ .Values.secrets.geoEngineUrl | toString | b64enc | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.google.clientId | toString | b64enc | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.google.clientSecret | toString | b64enc | quote }}
  META_APP_ID: {{ .Values.secrets.meta.appId | toString | b64enc | quote }}
  META_APP_SECRET: {{ .Values.secrets.meta.appSecret | toString | b64enc | quote }}
  YOUTUBE_CLIENT_ID: {{ .Values.secrets.youtube.clientId | toString | b64enc | quote }}
  YOUTUBE_CLIENT_SECRET: {{ .Values.secrets.youtube.clientSecret | toString | b64enc | quote }}
  LINKEDIN_CLIENT_ID: {{ .Values.secrets.linkedin.clientId | toString | b64enc | quote }}
  LINKEDIN_CLIENT_SECRET: {{ .Values.secrets.linkedin.clientSecret | toString | b64enc | quote }}
  TIKTOK_CLIENT_KEY: {{ .Values.secrets.tiktok.clientKey | toString | b64enc | quote }}
  TIKTOK_CLIENT_SECRET: {{ .Values.secrets.tiktok.clientSecret | toString | b64enc | quote }}
