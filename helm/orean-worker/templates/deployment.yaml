apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orean-worker.fullname" . }}
  labels:
    {{- include "orean-worker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.keda.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "orean-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orean-worker.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: orean-secrets
            - configMapRef:
                name: orean-config
          env:
            - name: ENABLE_WORKERS
              value: "true"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "process.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 60
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
